<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Byte - Control de Inventario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
</head>
<body>
    <header class="main-header">
        <img src="logo.png" alt="Logo Stock Byte" class="app-logo">
        <p class="app-description">Gestiona tus existencias en tiempo real.</p>
    </header>
    <div class="container">
        <div id="installContainer" class="install-banner">
            <div class="install-content">
                <img src="logo.png" alt="App Logo" class="mini-logo">
                <div id="statusText">
                    <strong id="appTitle">Instalar Stock Byte</strong>
                    <small id="appSub">Acceso rápido desde tu móvil</small>
                </div>
            </div>
            <button id="btnInstall" class="btn-download">Descargar</button>
        </div>


        <div class="total-badge">
            <small>Valor Total del Stock</small>
            <h2><span id="valorTotal">0.00</span>€</h2>
            <p>Artículos diferentes: <span id="totalArticulos">0</span></p>
        </div>

        <div class="total-badge secondary">
            <small>Ventas Realizadas (Caja)</small>
            <h2><span id="cajaActual">0.00</span>€</h2>
            <p>Ganancia neta: <span id="gananciaReal">0.00</span>€</p>
        </div>

        <div class="card input-card">
            <input type="text" id="nombreProd" placeholder="Nombre del producto">
            <div class="input-group">
                <select id="formatoCompra" onchange="toggleLogicaCompra()">
                    <option value="suelto">Compra Individual</option>
                    <option value="caja">Compra por Caja</option>
                </select>
                <select id="formatoVenta">
                    <option value="unidad">Venta por Unidad</option>
                    <option value="completa">Venta por Caja</option>
                </select>
            </div>
            <div id="seccionCaja" style="display: none;">
                <div class="input-group">
                    <input type="number" id="udsPorCaja" placeholder="Uds/caja">
                    <input type="number" id="cantidadCajas" placeholder="Nº cajas">
                </div>
            </div>
            <div class="input-group">
                <input type="number" id="precioCompraTotal" placeholder="Coste (€)" step="0.01">
                <input type="number" id="precioVentaFinal" placeholder="PVP (€)" step="0.01">
            </div>
            <button class="btn-add" onclick="procesarEntrada()">Añadir al Inventario</button>
        </div>

        <div class="card list-card">
            <div class="list-header">
                <h3>Inventario</h3>
                <input type="text" id="buscador" placeholder="🔍 Buscar..." oninput="filtrarProductos()">
            </div>
            <div id="listaProductos"></div>
        </div>

        <button onclick="limpiarInventario()" class="btn-clear">Vaciar Datos del Sistema</button>
    </div>

    <script src="script.js"></script>
    <script>
        let deferredPrompt;
        const btnInstall = document.getElementById('btnInstall');
        const appTitle = document.getElementById('appTitle');
        const appSub = document.getElementById('appSub');

        // Detectar si ya es app instalada
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            btnInstall.innerText = "✓";
            btnInstall.style.background = "#3b82f6"; 
            appTitle.innerText = "Versión Actualizada";
            appSub.innerText = "Stock Byte v2.0 - Al día";
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        btnInstall.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            } else if (btnInstall.innerText === "✓") {
                alert("Ya tienes instalada la última versión.");
            } else {
                alert("Para instalar: En iPhone usa 'Compartir' -> 'Añadir a pantalla de inicio'.");
            }
        });
    </script>
</body>
</html>
